name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        paper: [paper1_survey, paper2_assignment_corpus, paper3_detector_benchmark]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "${{ matrix.paper }}[dev]"
      - run: pytest -q --import-mode=importlib "${{ matrix.paper }}/tests"
